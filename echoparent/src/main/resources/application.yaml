spring:
  application:
    name: echoparent
  profiles:
    active: dev
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 3000ms
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.itdaie.pojo.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: echomusic-jwt-secret-key-for-hs256-signing-2026
  expiration: 86400000

# 阿里云 OSS：endpoint 填 oss-cn-xxx.aliyuncs.com 或带 https:// 均可（OssUtil 会规范化）；密钥见环境变量
aliyun:
  oss:
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucket-name: echomemory
    region: cn-beijing

logging:
  level:
    root: info
    com.itdaie.mapper: debug
