spring:
  application:
    name: echoparent
  profiles:
    active: dev
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.itdaie.pojo.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: info
    com.itdaie.mapper: debug
